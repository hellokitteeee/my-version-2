<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">


        <style>
            body{
                text-align: center;
                background-image: linear-gradient(to bottom, rgb(194,116,208), rgb(183, 48, 250));
                font-family: "Bitcount Grid Double", sans-serif;
            }
            h1 {
                font-size: 100px;
                background-image: url("bubblebackground.png");
                background-size: 300px;
                color: white;
                border-radius: 30px;
                border: 5px dotted rgb(255, 209, 254);
                font-weight: 400;
            }
            p {
                font-size: 60px;
            }
            a {
                text-decoration: none;
                color: white;
                font-size: 30px;
                width: 100px;
                border: 1px solid rgb(144, 73, 202);
                padding: 5px;
                margin: 20px;
                height: 5px;
                border-radius: 7px;
            }
            a:hover {
                border: 5px dotted rgb(214, 163, 255);
            }
            a:focus {
                border-color: rgb(144, 73, 202);
                color: rgb(247, 203, 255);
            }
        </style>
    </head>
    <body>
        <h1> YOUR SCORE</h1>
        <p id = "myscore">score</p>
             <div>   
                <a href="game.html">PLAY AGAIN</a><br>
                <a href="mainmenu.html">main menu</a></div><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
                <script>
                    //loads score
                    let savedscore = localStorage.getItem("finalScore");
                    
                    //checks if score existss fisrt
                    if (savedscore !== null) {
                        document.getElementById("myscore").innerText = savedscore;
                    } else {
                        document.getElementById("myscore").innerText = "0";
                    }

                </script>
         <audio id="menumusic" loop>
        <source src="menumusic.mp3" type="audio/mpeg">
        </audio>

        <script>
            document.body.addEventListener('click', function() {
                let audio = document.getElementById('menumusic');
                if (audio.paused) {
                    audio.play();
                }
            });
        </script>
    </body>
</html>
